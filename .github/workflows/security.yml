name: Security & Dependency Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 1:00 AM UTC
    - cron: '0 1 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'
        cache: maven

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Run OWASP Dependency Check
      run: |
        ./mvnw org.owasp:dependency-check-maven:check -B \
          -DfailBuildOnCVSS=7 \
          -DskipTests

    - name: Run Rust security audit
      run: |
        cargo install cargo-audit
        cd wamr4j-native
        cargo audit --json > ../rust-audit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          target/dependency-check-report.html
          rust-audit-report.json
        retention-days: 30

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0  # Full history for SonarCloud

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'
        cache: maven

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - name: Run tests with coverage
      run: |
        ./mvnw clean test jacoco:report -B

    - name: Run Rust clippy analysis
      run: |
        cd wamr4j-native
        cargo clippy --all-targets --all-features -- -D warnings --json > ../clippy-report.json || true

    - name: SonarCloud Scan
      if: env.SONAR_TOKEN != ''
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Upload quality reports
      uses: actions/upload-artifact@v4
      with:
        name: quality-reports
        path: |
          **/target/site/jacoco/
          clippy-report.json
        retention-days: 30

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'
        cache: maven

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install license checking tools
      run: |
        cargo install cargo-license
        npm install -g license-checker

    - name: Check Maven licenses
      run: |
        ./mvnw license:aggregate-third-party-report -B

    - name: Check Rust licenses
      run: |
        cd wamr4j-native
        cargo license --json > ../rust-licenses.json

    - name: Validate license compliance
      run: |
        # Create license validation script
        cat > check_licenses.py << 'EOF'
        #!/usr/bin/env python3
        import json
        import xml.etree.ElementTree as ET
        from pathlib import Path

        # Allowed licenses (modify as needed)
        ALLOWED_LICENSES = {
            'MIT', 'Apache-2.0', 'BSD-2-Clause', 'BSD-3-Clause', 
            'ISC', 'Unlicense', 'CC0-1.0'
        }

        def check_rust_licenses():
            if not Path('rust-licenses.json').exists():
                return True
                
            with open('rust-licenses.json') as f:
                licenses = json.load(f)
            
            violations = []
            for pkg in licenses:
                license_name = pkg.get('license')
                if license_name and license_name not in ALLOWED_LICENSES:
                    violations.append(f"Rust package {pkg['name']}: {license_name}")
            
            return violations

        def main():
            violations = check_rust_licenses()
            
            if violations:
                print("License violations found:")
                for violation in violations:
                    print(f"  - {violation}")
                return 1
            else:
                print("All licenses are compliant")
                return 0

        if __name__ == "__main__":
            exit(main())
        EOF
        
        python check_licenses.py

    - name: Upload license reports
      uses: actions/upload-artifact@v4
      with:
        name: license-reports
        path: |
          target/generated-sources/license/THIRD-PARTY.txt
          rust-licenses.json
        retention-days: 30