name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build native libraries on each platform's native runner
  build-native:
    name: Native (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            lib: libwamr4j_native.so
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            lib: libwamr4j_native.so
          - os: macos-latest
            platform: darwin-aarch64
            target: aarch64-apple-darwin
            lib: libwamr4j_native.dylib
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            lib: wamr4j_native.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wamr4j-native/.cargo-target
          key: cargo-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', 'wamr4j-native/build.rs') }}
          restore-keys: cargo-${{ matrix.platform }}-

      - name: Build native library
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/wamr4j-native/.cargo-target
        run: |
          cd wamr4j-native
          cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: wamr4j-native/.cargo-target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 7
          if-no-files-found: error

  # Static analysis (no native libs needed, runs in parallel with build-native)
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-quality-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-quality-

      - name: Checkstyle
        continue-on-error: true
        run: ./mvnw checkstyle:check -B -pl wamr4j,wamr4j-jni,wamr4j-panama

      - name: Spotless
        continue-on-error: true
        run: ./mvnw spotless:check -B -pl wamr4j,wamr4j-jni,wamr4j-panama

      - name: SpotBugs
        continue-on-error: true
        run: ./mvnw compile spotbugs:check -B -pl wamr4j,wamr4j-jni,wamr4j-panama

  # Test matrix -- downloads pre-built native libs
  test:
    name: Test Java ${{ matrix.java }} (${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '22'
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '23'
          # Linux ARM64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '22'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '23'
          # macOS ARM64
          - os: macos-latest
            platform: darwin-aarch64
            java: '22'
          - os: macos-latest
            platform: darwin-aarch64
            java: '23'
          # Windows x86_64
          - os: windows-latest
            platform: windows-x86_64
            java: '22'
          - os: windows-latest
            platform: windows-x86_64
            java: '23'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-test-${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-test-

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: wamr4j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/

      - name: Verify native library
        shell: bash
        run: ls -la wamr4j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/

      - name: Copy native library to JNI and Panama modules
        shell: bash
        run: |
          mkdir -p wamr4j-jni/src/main/resources/META-INF/native/${{ matrix.platform }}/
          mkdir -p wamr4j-panama/src/main/resources/META-INF/native/${{ matrix.platform }}/
          cp wamr4j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/* \
             wamr4j-jni/src/main/resources/META-INF/native/${{ matrix.platform }}/
          cp wamr4j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/* \
             wamr4j-panama/src/main/resources/META-INF/native/${{ matrix.platform }}/

      - name: Run tests
        shell: bash
        timeout-minutes: 25
        run: |
          # Run Maven in background with watchdog for surefire fork hang (known issue on Java 23)
          ./mvnw test -B -pl '!wamr4j-benchmarks,!wamr4j-tests/fuzz' -P skip-native \
            -DargLine="--enable-native-access=ALL-UNNAMED" \
            -Djacoco.skip=true &
          MVN_PID=$!
          ( sleep 1200 && kill $MVN_PID 2>/dev/null ) &
          WD=$!
          EC=0; wait $MVN_PID 2>/dev/null || EC=$?
          kill $WD 2>/dev/null || true; wait $WD 2>/dev/null || true
          # If killed by watchdog, verify tests actually passed via surefire reports
          if [ "$EC" -eq 143 ] || [ "$EC" -eq 137 ]; then
            echo "Maven killed by watchdog (surefire fork hang)"
            if grep -rq 'failures="[1-9]\|errors="[1-9]' */target/surefire-reports/TEST-*.xml 2>/dev/null; then
              echo "Test failures detected"
              exit 1
            fi
            echo "All tests passed despite fork hang"
            exit 0
          fi
          exit $EC

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.platform }}-java${{ matrix.java }}
          path: '**/target/surefire-reports/'
          retention-days: 7
