name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build native libraries on each platform
  build-native:
    name: Native (${{ matrix.platform }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            lib: libwamr4j_native.so
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            lib: libwamr4j_native.so
          - os: macos-latest
            platform: darwin-aarch64
            target: aarch64-apple-darwin
            lib: libwamr4j_native.dylib
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            lib: wamr4j_native.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wamr4j-native/.cargo-target
          key: cargo-${{ matrix.platform }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', 'wamr4j-native/build.rs') }}
          restore-keys: cargo-${{ matrix.platform }}-

      - name: Build native library
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/wamr4j-native/.cargo-target
        run: |
          cd wamr4j-native
          cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: wamr4j-native/.cargo-target/${{ matrix.target }}/release/${{ matrix.lib }}
          retention-days: 90
          if-no-files-found: error

  # Test on each platform with JNI (Java 17) and Panama (Java 23)
  test:
    name: Test Java ${{ matrix.java }} (${{ matrix.platform }})
    needs: build-native
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '17'
          - os: ubuntu-latest
            platform: linux-x86_64
            java: '23'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '17'
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            java: '23'
          - os: macos-latest
            platform: darwin-aarch64
            java: '17'
          - os: macos-latest
            platform: darwin-aarch64
            java: '23'
          - os: windows-latest
            platform: windows-x86_64
            java: '17'
          - os: windows-latest
            platform: windows-x86_64
            java: '23'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-test-${{ matrix.java }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-test-

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: wamr4j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/

      - name: Copy native library to JNI and Panama modules
        shell: bash
        run: |
          mkdir -p wamr4j-jni/src/main/resources/META-INF/native/${{ matrix.platform }}/
          mkdir -p wamr4j-panama/src/main/resources/META-INF/native/${{ matrix.platform }}/
          cp wamr4j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/* \
             wamr4j-jni/src/main/resources/META-INF/native/${{ matrix.platform }}/
          cp wamr4j-native/src/main/resources/META-INF/native/${{ matrix.platform }}/* \
             wamr4j-panama/src/main/resources/META-INF/native/${{ matrix.platform }}/

      - name: Run tests
        shell: bash
        timeout-minutes: 25
        run: |
          # Run Maven in background with watchdog for surefire fork hang (known issue on Java 23)
          ./mvnw test -B -pl '!wamr4j-benchmarks,!wamr4j-tests/fuzz' -P skip-native \
            -DargLine="--enable-native-access=ALL-UNNAMED" \
            -Djacoco.skip=true &
          MVN_PID=$!
          ( sleep 1200 && kill $MVN_PID 2>/dev/null ) &
          WD=$!
          EC=0; wait $MVN_PID 2>/dev/null || EC=$?
          kill $WD 2>/dev/null || true; wait $WD 2>/dev/null || true
          # If killed by watchdog, verify tests actually passed via surefire reports
          if [ "$EC" -eq 143 ] || [ "$EC" -eq 137 ]; then
            echo "Maven killed by watchdog (surefire fork hang)"
            if grep -rq 'failures="[1-9]\|errors="[1-9]' */target/surefire-reports/TEST-*.xml 2>/dev/null; then
              echo "Test failures detected"
              exit 1
            fi
            echo "All tests passed despite fork hang"
            exit 0
          fi
          exit $EC

  # Quality checks before publication
  quality:
    name: Quality Gate
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-quality-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-quality-

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x86_64
          path: wamr4j-native/src/main/resources/META-INF/native/linux-x86_64/

      - name: Copy native library
        run: |
          mkdir -p wamr4j-jni/src/main/resources/META-INF/native/linux-x86_64/
          mkdir -p wamr4j-panama/src/main/resources/META-INF/native/linux-x86_64/
          cp wamr4j-native/src/main/resources/META-INF/native/linux-x86_64/* \
             wamr4j-jni/src/main/resources/META-INF/native/linux-x86_64/
          cp wamr4j-native/src/main/resources/META-INF/native/linux-x86_64/* \
             wamr4j-panama/src/main/resources/META-INF/native/linux-x86_64/

      - name: Checkstyle
        run: ./mvnw checkstyle:check -B -P skip-native -pl wamr4j

      - name: SpotBugs
        run: ./mvnw compile spotbugs:check -B -P skip-native -pl wamr4j -Dspotbugs.threshold=Medium

      - name: Javadoc
        run: ./mvnw compile javadoc:jar -B -P release,skip-native -pl wamr4j

  # Publish -- requires manual approval via GitHub environment
  publish:
    name: Publish
    needs: [test, quality]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify secrets are configured
        run: |
          errors=0
          if [ -z "${{ secrets.MAVEN_CENTRAL_USERNAME }}" ]; then
            echo "::error::MAVEN_CENTRAL_USERNAME secret is not set"
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" ]; then
            echo "::error::MAVEN_CENTRAL_PASSWORD secret is not set"
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set"
            errors=$((errors + 1))
          fi
          if [ -z "${{ secrets.GPG_PASSPHRASE }}" ]; then
            echo "::error::GPG_PASSPHRASE secret is not set"
            errors=$((errors + 1))
          fi
          if [ $errors -gt 0 ]; then
            echo "::error::$errors required secret(s) missing. Configure them in Settings > Secrets > Actions."
            exit 1
          fi
          echo "All required secrets are configured"

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-publish-${{ hashFiles('**/pom.xml') }}
          restore-keys: m2-publish-

      # Download all native libraries into resource directories
      - name: Download linux-x86_64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x86_64
          path: wamr4j-native/src/main/resources/META-INF/native/linux-x86_64/
      - name: Download linux-aarch64
        uses: actions/download-artifact@v4
        with:
          name: native-linux-aarch64
          path: wamr4j-native/src/main/resources/META-INF/native/linux-aarch64/
      - name: Download darwin-aarch64
        uses: actions/download-artifact@v4
        with:
          name: native-darwin-aarch64
          path: wamr4j-native/src/main/resources/META-INF/native/darwin-aarch64/
      - name: Download windows-x86_64
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x86_64
          path: wamr4j-native/src/main/resources/META-INF/native/windows-x86_64/

      - name: Copy native libraries to JNI and Panama modules
        run: |
          for platform in linux-x86_64 linux-aarch64 darwin-aarch64 windows-x86_64; do
            mkdir -p wamr4j-jni/src/main/resources/META-INF/native/$platform/
            mkdir -p wamr4j-panama/src/main/resources/META-INF/native/$platform/
            cp wamr4j-native/src/main/resources/META-INF/native/$platform/* \
               wamr4j-jni/src/main/resources/META-INF/native/$platform/
            cp wamr4j-native/src/main/resources/META-INF/native/$platform/* \
               wamr4j-panama/src/main/resources/META-INF/native/$platform/
          done

      - name: Verify native libraries
        run: |
          echo "Native library layout:"
          find wamr4j-native/src/main/resources/META-INF/native/ -type f
          test -f wamr4j-native/src/main/resources/META-INF/native/linux-x86_64/libwamr4j_native.so
          test -f wamr4j-native/src/main/resources/META-INF/native/linux-aarch64/libwamr4j_native.so
          test -f wamr4j-native/src/main/resources/META-INF/native/darwin-aarch64/libwamr4j_native.dylib
          test -f wamr4j-native/src/main/resources/META-INF/native/windows-x86_64/wamr4j_native.dll

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install native module locally
        run: |
          ./mvnw install -B -P skip-native \
            -pl wamr4j-native \
            -DskipTests \
            -Drevision=${{ steps.version.outputs.version }}

      - name: Deploy to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./mvnw deploy -B -P release \
            -pl wamr4j,wamr4j-jni,wamr4j-panama \
            -DskipTests \
            -Drevision=${{ steps.version.outputs.version }}

      - name: Deploy to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings-github.xml <<'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
          ./mvnw deploy -B \
            -pl wamr4j,wamr4j-jni,wamr4j-panama \
            -DskipTests \
            -Drevision=${{ steps.version.outputs.version }} \
            -DaltDeploymentRepository=github::https://maven.pkg.github.com/${{ github.repository }} \
            -Dgpg.skip=true \
            -s ~/.m2/settings-github.xml

      - name: Package release artifacts
        run: |
          ./mvnw package -B -P release \
            -pl wamr4j,wamr4j-jni,wamr4j-panama \
            -DskipTests \
            -Drevision=${{ steps.version.outputs.version }}

      - name: Create checksums
        run: |
          for dir in wamr4j/target wamr4j-native/target wamr4j-jni/target wamr4j-panama/target; do
            if [ -d "$dir" ]; then
              for jar in "$dir"/*.jar; do
                [ -f "$jar" ] && sha256sum "$jar" > "$jar.sha256"
              done
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wamr4j/target/*.jar
            wamr4j/target/*.jar.sha256
            wamr4j-jni/target/*.jar
            wamr4j-jni/target/*.jar.sha256
            wamr4j-panama/target/*.jar
            wamr4j-panama/target/*.jar.sha256
