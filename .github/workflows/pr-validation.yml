name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main, develop, 'epic/**' ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: '-Xmx2g -Xms1g'
  CARGO_TERM_COLOR: always

jobs:
  pr-checks:
    name: PR Validation Checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        submodules: recursive

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'
        cache: maven

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Validate PR title and description
      run: |
        # Check if PR title follows conventional commit format
        PR_TITLE="${{ github.event.pull_request.title }}"
        if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|perf|test|chore)(\(.+\))?: .+ ]]; then
          echo "❌ PR title must follow conventional commit format"
          echo "Examples:"
          echo "  feat: add new WebAssembly module loading feature"
          echo "  fix(jni): resolve memory leak in native bindings"
          echo "  docs: update API documentation for Panama bindings"
          exit 1
        fi
        
        # Check if PR has a description
        PR_BODY="${{ github.event.pull_request.body }}"
        if [ -z "$PR_BODY" ] || [ ${#PR_BODY} -lt 20 ]; then
          echo "❌ PR must have a meaningful description"
          exit 1
        fi
        
        echo "✅ PR title and description validation passed"

    - name: Check for breaking changes
      run: |
        # Check if this is a breaking change
        PR_TITLE="${{ github.event.pull_request.title }}"
        PR_BODY="${{ github.event.pull_request.body }}"
        
        if [[ "$PR_TITLE" == *"!"* ]] || [[ "$PR_BODY" == *"BREAKING CHANGE"* ]]; then
          echo "⚠️ This PR contains breaking changes"
          echo "Breaking changes detected in PR title or description"
        fi

    - name: Validate file changes
      run: |
        # Check for changes to critical files
        git fetch origin ${{ github.event.pull_request.base.ref }}
        CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
        
        echo "Changed files:"
        echo "$CHANGED_FILES"
        
        # Check for changes to POM files
        if echo "$CHANGED_FILES" | grep -q "pom.xml"; then
          echo "⚠️ POM file changes detected - ensure version consistency"
        fi
        
        # Check for changes to Cargo files
        if echo "$CHANGED_FILES" | grep -q "Cargo.toml\|Cargo.lock"; then
          echo "⚠️ Rust dependency changes detected - ensure compatibility"
        fi
        
        # Check for changes to GitHub workflows
        if echo "$CHANGED_FILES" | grep -q ".github/workflows"; then
          echo "⚠️ CI workflow changes detected - ensure backward compatibility"
        fi

  build-pr:
    name: Build PR Changes
    runs-on: ${{ matrix.os }}
    if: github.event.pull_request.draft == false
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos-aarch64
            target: aarch64-apple-darwin

    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        submodules: recursive

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'
        cache: maven

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          ~/.m2/repository/
          wamr4j-native/target/
        key: ${{ runner.os }}-pr-${{ hashFiles('**/Cargo.lock', '**/pom.xml') }}

    - name: Build native library
      run: |
        cd wamr4j-native
        cargo build --target ${{ matrix.target }}

    - name: Run Rust tests
      run: |
        cd wamr4j-native
        cargo test --target ${{ matrix.target }}

    - name: Run Rust quality checks
      run: |
        cd wamr4j-native
        cargo fmt --check
        cargo clippy --target ${{ matrix.target }} -- -D warnings

    - name: Build Java modules
      run: |
        ./mvnw clean compile -B

    - name: Run Java tests
      run: |
        ./mvnw test -B

    - name: Run Java quality checks
      run: |
        ./mvnw checkstyle:check spotless:check spotbugs:check -B

  integration-test:
    name: Integration Tests
    needs: build-pr
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        submodules: recursive

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'
        cache: maven

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build and test
      run: |
        ./mvnw clean test -B -P native-all-platforms

    - name: Run integration tests
      run: |
        ./mvnw test -B -Dtest="*IT"

  performance-check:
    name: Performance Impact Check
    needs: build-pr
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout base branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.base.sha }}
        submodules: recursive

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'
        cache: maven

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Build baseline
      run: |
        ./mvnw clean package -B -DskipTests
        # Run baseline benchmarks if benchmark module exists
        if [ -d "wamr4j-benchmarks" ]; then
          echo "Running baseline benchmarks..."
          # Placeholder for benchmark execution
        fi

    - name: Checkout PR branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        submodules: recursive
        clean: false

    - name: Build PR version
      run: |
        ./mvnw clean package -B -DskipTests
        # Run PR benchmarks if benchmark module exists
        if [ -d "wamr4j-benchmarks" ]; then
          echo "Running PR benchmarks..."
          # Placeholder for benchmark execution and comparison
        fi

    - name: Compare performance
      run: |
        echo "Performance comparison placeholder"
        echo "Future implementation will compare benchmark results and report significant changes"

  security-scan:
    name: Security Scan
    needs: build-pr
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        submodules: recursive

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'
        cache: maven

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Run dependency security check
      run: |
        ./mvnw org.owasp:dependency-check-maven:check -B -DfailBuildOnCVSS=8

    - name: Run Rust security audit
      run: |
        cargo install cargo-audit
        cd wamr4j-native
        cargo audit

  pr-summary:
    name: PR Validation Summary
    needs: [pr-checks, build-pr, integration-test, performance-check, security-scan]
    runs-on: ubuntu-latest
    if: always() && github.event.pull_request.draft == false
    
    steps:
    - name: Generate PR summary
      run: |
        echo "## PR Validation Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| PR Checks | ${{ needs.pr-checks.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ${{ needs.build-pr.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Performance Check | ${{ needs.performance-check.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Determine overall status
        if [[ "${{ needs.pr-checks.result }}" == "success" && 
              "${{ needs.build-pr.result }}" == "success" && 
              "${{ needs.integration-test.result }}" == "success" && 
              "${{ needs.performance-check.result }}" == "success" && 
              "${{ needs.security-scan.result }}" == "success" ]]; then
          echo "✅ **All PR validation checks passed!**" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Some PR validation checks failed. Please review and fix the issues.**" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Comment on PR
      uses: actions/github-script@v7
      with:
        script: |
          const results = {
            'pr-checks': '${{ needs.pr-checks.result }}',
            'build-pr': '${{ needs.build-pr.result }}',
            'integration-test': '${{ needs.integration-test.result }}',
            'performance-check': '${{ needs.performance-check.result }}',
            'security-scan': '${{ needs.security-scan.result }}'
          };
          
          const success = Object.values(results).every(r => r === 'success');
          const emoji = success ? '✅' : '❌';
          const status = success ? 'All checks passed!' : 'Some checks failed';
          
          let comment = `## ${emoji} PR Validation Results\n\n`;
          comment += `**Status**: ${status}\n\n`;
          comment += `| Check | Result |\n|-------|--------|\n`;
          
          for (const [check, result] of Object.entries(results)) {
            const resultEmoji = result === 'success' ? '✅' : result === 'failure' ? '❌' : '⚠️';
            comment += `| ${check} | ${resultEmoji} ${result} |\n`;
          }
          
          if (!success) {
            comment += `\n**Please review the failed checks and make necessary corrections.**`;
          }
          
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });