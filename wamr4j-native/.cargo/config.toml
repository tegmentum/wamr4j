# Cross-compilation configuration for wamr4j-native
# Supports target platforms: Linux/Windows/macOS x86_64 and ARM64
#
# Note: crt-static is NOT used on Linux because it prevents cdylib (.so)
# generation. macOS uses dynamic CRT by default. Windows MSVC uses static
# CRT for self-contained binaries.

[build]
# Default target-dir for consistency
target-dir = "target"

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=x86-64",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=generic",
    "-C", "target-feature=+neon",
]

[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-cpu=x86-64",
    "-C", "target-feature=+crt-static"
]

[target.aarch64-pc-windows-msvc]
rustflags = [
    "-C", "target-cpu=generic",
    "-C", "target-feature=+neon",
    "-C", "target-feature=+crt-static"
]

[target.x86_64-apple-darwin]
linker = "clang"
rustflags = [
    "-C", "target-cpu=x86-64",
    "-C", "link-arg=-mmacosx-version-min=10.15",
]

[target.aarch64-apple-darwin]
linker = "clang"
rustflags = [
    "-C", "target-cpu=apple-m1",
    "-C", "target-feature=+neon",
    "-C", "link-arg=-mmacosx-version-min=11.0",
]

# Environment variables for cross-compilation
[env]
PKG_CONFIG_ALLOW_CROSS = "1"
