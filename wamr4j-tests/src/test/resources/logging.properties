# Logging configuration for wamr4j tests
# Standard logging level for normal test execution

handlers=java.util.logging.ConsoleHandler

# Default logging level
.level=INFO

# Console handler configuration
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Format pattern: timestamp level logger message
java.util.logging.SimpleFormatter.format=%1$tF %1$tT %4$s %2$s %5$s%6$s%n

# Package-specific levels
ai.tegmentum.wamr4j.level=INFO
ai.tegmentum.wamr4j.test.level=INFO
ai.tegmentum.wamr4j.test.framework.level=INFO
ai.tegmentum.wamr4j.test.comparison.level=INFO
